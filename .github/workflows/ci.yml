name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build test image
        run: docker build -f test/docker/Dockerfile -t screentimectl-test .

      - name: Run integration tests
        run: docker run --rm screentimectl-test
